# .github/workflows/dco.yml
#
# Enforce the Developer Certificate of Origin: every commit in a pull request
# must carry a `Signed-off-by:` trailer (git commit -s), as required by
# CONTRIBUTING.md. This keeps inbound provenance clean and preserves the
# project's ability to relicense future versions.
name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-signoff:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the full PR commit range

      - name: Verify every PR commit is signed off
        run: |
          set -eu
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          # iterate commits unique to this PR
          for sha in $(git rev-list "$base".."$head"); do
            author="$(git show -s --format='%an <%ae>' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            # a valid trailer: "Signed-off-by: Name <email>"
            if ! git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha ($subject) is missing a Signed-off-by trailer"
              echo "  author: $author"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are not signed off. Sign off with:"
            echo "    git commit --amend -s            # last commit"
            echo "    git rebase --signoff <base>..HEAD  # a range"
            echo "See CONTRIBUTING.md (Developer Certificate of Origin)."
            exit 1
          fi
          echo "All PR commits are signed off."
