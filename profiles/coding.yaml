# QuantmLayer default profile: Coding / Dev Agent
# Covers Claude Code, Cursor, Devin-style, OpenHands, Aider.
#
# Strategy: "soft inside, hard shell". Coding agents run arbitrary build
# tools, so we do NOT enumerate every allowed syscall; we allow the broad
# set and DENY the handful that are never legitimate and are escape hatches.
# The real containment is the filesystem, network, capability, and resource
# walls below.

schema_version: 1
agent_type: coding

filesystem:
  readwrite:
    - "/workspace/**"
    - "/tmp/agent/**"
  readonly:
    - "/usr/**"
    - "/bin/**"
    - "/lib/**"
    - "/etc/ssl/certs/**"
  denied:                 # invisible to the agent — not merely unwritable
    - "/home/**"          # blocks ~/.ssh, ~/.aws, ~/.config exfiltration
    - "/root/**"
    - "/etc/shadow"
    - "/var/run/docker.sock"
    - "/sys/**"

network:
  default_deny: true
  block_private_ranges: true   # blocks 169.254.169.254 cloud-metadata SSRF
  allow_domains:
    - "api.anthropic.com"
    - "api.openai.com"
    - "pypi.org"
    - "files.pythonhosted.org"
    - "registry.npmjs.org"
    - "github.com"
    - "api.github.com"
    - "codeload.github.com"
    - "crates.io"
    - "static.crates.io"

capabilities:
  retain: []              # drop everything; coding agents need no capabilities

syscalls:
  default_action: allow   # compilers need the long tail
  deny:                   # never-legitimate escape hatches
    - mount
    - umount2
    - pivot_root
    - chroot
    - setns
    - unshare
    - kexec_load
    - init_module
    - finit_module
    - delete_module
    - bpf
    - ptrace
    - process_vm_readv
    - process_vm_writev
    - perf_event_open
  notify:                 # allowed but trapped for inspection
    - execve
    - connect

resources:
  memory_max_bytes: 4294967296   # 4 GiB
  cpu_max_percent: 200           # 2 cores
  pids_max: 256                  # caps fork bombs
  wall_clock_secs: 300           # kill hung build steps

processes:
  allow_exec:
    - "/usr/bin/git"
    - "/usr/bin/python3"
    - "/usr/bin/node"
    - "/usr/bin/npm"
    - "/usr/bin/pip3"
    - "/usr/bin/gcc"
    - "/usr/bin/make"
    - "/usr/bin/cargo"
    - "/usr/bin/sh"
