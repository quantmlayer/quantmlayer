# QuantmLayer bundled profile: Claude Code (`claude`)
#
# Field-validated 2026-07-03 against Claude Code v2.1.199 (Claude Max): auth
# domains platform.claude.com + mcp-proxy.anthropic.com added from observed
# denials; contained calc.py fix, SSH-key invisibility (empty tmpfs), and
# egress denials all confirmed. Datadog telemetry intentionally left denied.
#
# Curated for Anthropic's Claude Code CLI. Embedded into the `ql` binary and
# selected with `ql agent claude` or `ql run --agent claude -- claude ...`.
#
# Design notes (read before editing):
# * Claude Code keeps its auth/session state under `~/.claude` and
#   `~/.claude.json`, so this profile CANNOT hide all of `$HOME` the way
#   `profiles/coding.yaml` does. Instead it denies the well-known secret
#   locations individually — the same list `ql learn` synthesizes. The
#   tradeoff is explicit: non-secret files in `$HOME` remain visible; the
#   SSH/AWS/GPG/kube/gcloud credentials and /etc/shadow do not.
# * The domain allow-list is a curated first cut (API, auth/console,
#   feature-flag and error-reporting endpoints, plus the package registries a
#   coding agent needs). Tighten it for your environment by re-deriving with:
#   `ql learn --out claude.yaml -- claude -p "your task"`.
# * No wall-clock limit: Claude Code sessions are interactive and long-lived.

schema_version: 1
agent_type: coding

filesystem:
  readwrite:
    - "/workspace/**"
    - "/tmp/agent/**"
    - "/home/*/.claude/**"     # auth, sessions, todo state
    - "/home/*/.claude.json"   # top-level config
  readonly:
    - "/usr/**"
    - "/bin/**"
    - "/lib/**"
    - "/etc/ssl/certs/**"
  denied:                      # invisible to the agent — not merely unwritable
    - "/home/*/.ssh/**"
    - "/root/.ssh/**"
    - "/home/*/.aws/**"
    - "/root/.aws/**"
    - "/home/*/.gnupg/**"
    - "/home/*/.kube/**"
    - "/home/*/.config/gcloud/**"
    - "/etc/shadow"
    - "/var/run/docker.sock"

network:
  default_deny: true
  block_private_ranges: true   # blocks 169.254.169.254 cloud-metadata SSRF
  allow_domains:
    # Claude Code itself
    - "api.anthropic.com"
    - "console.anthropic.com"     # account/auth
    - "platform.claude.com"       # subscription (Pro/Max) auth token exchange — field-confirmed
    - "claude.com"                # OAuth login URL host (manual paste flow)
    - "mcp-proxy.anthropic.com"   # built-in tools/connectors backend — field-confirmed
    - "statsig.anthropic.com"     # feature flags
    - "sentry.io"                 # error reporting
    # Package registries a coding task legitimately needs
    - "pypi.org"
    - "files.pythonhosted.org"
    - "registry.npmjs.org"
    - "crates.io"
    - "static.crates.io"
    - "index.crates.io"
    # Source hosting
    - "github.com"
    - "api.github.com"
    - "codeload.github.com"
    - "raw.githubusercontent.com"
    - "objects.githubusercontent.com"

capabilities:
  retain: []                   # drop everything

syscalls:
  default_action: allow        # compilers need the long tail
  deny:                        # never-legitimate escape hatches
    - mount
    - umount2
    - pivot_root
    - chroot
    - setns
    - unshare
    - kexec_load
    - init_module
    - finit_module
    - delete_module
    - bpf
    - ptrace
    - process_vm_readv
    - process_vm_writev
    - perf_event_open
  notify:
    - execve
    - connect

resources:
  memory_max_bytes: 8589934592 # 8 GiB — Claude Code + builds
  cpu_max_percent: 400         # 4 cores
  pids_max: 512
  # wall_clock_secs deliberately unset: interactive sessions are long-lived.

processes:
  allow_exec:
    - "/usr/bin/env"
    - "/bin/sh"
    - "/usr/bin/sh"
    - "/bin/bash"
    - "/usr/bin/bash"
    - "/usr/bin/git"
    - "/usr/bin/python3"
    - "/usr/bin/node"
    - "/usr/bin/npm"
    - "/usr/bin/pip3"
    - "/usr/bin/gcc"
    - "/usr/bin/make"
    - "/usr/bin/cargo"
    - "/usr/bin/rg"
